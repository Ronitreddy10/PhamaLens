<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PharmaLens</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070c;
      --panel: rgba(18, 23, 33, 0.72);
      --panel-strong: rgba(23, 29, 43, 0.9);
      --line: rgba(255, 255, 255, 0.11);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #f7f8fb;
      --muted: rgba(247, 248, 251, 0.62);
      --soft: rgba(247, 248, 251, 0.4);
      --accent: #8fd3ff;
      --accent-2: #9b8cff;
      --green: #61e59f;
      --danger: #ff5e78;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 5%, rgba(92, 151, 255, 0.24), transparent 34rem),
        radial-gradient(circle at 88% 12%, rgba(139, 92, 246, 0.22), transparent 30rem),
        radial-gradient(circle at 66% 92%, rgba(47, 197, 160, 0.13), transparent 30rem),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .shell {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      height: 100vh;
      padding: 18px;
      gap: 18px;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.095), rgba(255,255,255,0.045));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px) saturate(140%);
      -webkit-backdrop-filter: blur(28px) saturate(140%);
    }

    aside {
      border-radius: 30px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ff4c62, #ffce55);
      box-shadow: 0 16px 35px rgba(255, 86, 100, 0.24);
      font-size: 24px;
    }

    .brand h1 { font-size: 22px; margin: 0; letter-spacing: -0.04em; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }

    .metric {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .metric span { color: var(--muted); font-size: 13px; }
    .metric strong { display: block; font-size: 40px; letter-spacing: -0.05em; margin-top: 5px; }

    .label {
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    select {
      width: 100%;
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 15px;
      color: var(--text);
      background: rgba(0, 0, 0, 0.22);
      padding: 13px 14px;
      outline: none;
    }

    .examples {
      margin-top: auto;
      display: grid;
      gap: 10px;
    }

    .example {
      border: 1px solid var(--line);
      color: rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.055);
      border-radius: 18px;
      padding: 13px;
      text-align: left;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }
    .example:hover {
      transform: translateY(-1px);
      border-color: rgba(143, 211, 255, 0.4);
      background: rgba(143, 211, 255, 0.1);
    }

    main {
      min-width: 0;
      min-height: 0;
      border-radius: 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      position: relative;
    }

    .topbar {
      padding: 26px 30px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(30px, 4vw, 54px);
      letter-spacing: -0.07em;
      line-height: 0.95;
    }
    .hero p {
      margin: 9px 0 0;
      color: var(--muted);
      max-width: 740px;
      line-height: 1.5;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 18px var(--green); }

    .chat {
      min-height: 0;
      overflow: auto;
      padding: 26px 30px;
      scroll-behavior: smooth;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }
    .empty-card {
      max-width: 620px;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      background: rgba(255,255,255,0.045);
    }
    .empty-card h3 { color: var(--text); margin: 0 0 8px; font-size: 24px; letter-spacing: -0.04em; }
    .empty-card p { line-height: 1.6; margin: 0; }

    .message {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 14px;
      margin-bottom: 22px;
      align-items: start;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
    }
    .avatar.user { background: linear-gradient(135deg, #ff3f57, #ff8848); }
    .avatar.ai { background: linear-gradient(135deg, #70d6ff, #9b8cff); color: #05070c; }

    .bubble {
      max-width: 1040px;
      border-radius: 24px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.055);
      line-height: 1.62;
      box-shadow: 0 18px 45px rgba(0,0,0,0.18);
    }
    .message.user .bubble {
      background: rgba(255,255,255,0.085);
      font-weight: 650;
    }
    .bubble h3 { margin: 0 0 10px; font-size: 18px; letter-spacing: -0.02em; }
    .bubble p { margin: 0 0 12px; }
    .bubble ul { margin: 8px 0 10px 20px; padding: 0; }
    .bubble li { margin: 7px 0; }
    .cite {
      color: #b6e4ff;
      background: rgba(143,211,255,0.1);
      border: 1px solid rgba(143,211,255,0.18);
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 0.92em;
    }

    .sources {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(0,0,0,0.18);
    }
    .sources summary {
      list-style: none;
      padding: 13px 15px;
      color: rgba(255,255,255,0.82);
      font-weight: 700;
    }
    .sources summary::-webkit-details-marker { display: none; }
    .source {
      padding: 14px 15px;
      border-top: 1px solid var(--line);
    }
    .source-title {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-weight: 750;
    }
    .pill {
      color: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
    }
    .modality {
      color: rgba(255,255,255,0.9);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
    }
    .modality.mandatory { background: rgba(255, 94, 120, 0.18); border-color: rgba(255, 94, 120, 0.44); }
    .modality.recommended { background: rgba(255, 205, 86, 0.18); border-color: rgba(255, 205, 86, 0.42); }
    .modality.optional { background: rgba(143, 211, 255, 0.16); border-color: rgba(143, 211, 255, 0.4); }
    .modality.prohibited { background: rgba(160, 30, 55, 0.32); border-color: rgba(255, 94, 120, 0.54); }
    .delta-panel {
      max-width: 1040px;
      margin: 0 0 10px;
      border-radius: 20px;
      padding: 14px 16px;
      background: rgba(255, 190, 80, 0.14);
      border: 1px solid rgba(255, 190, 80, 0.42);
      color: rgba(255,255,255,0.92);
    }
    .delta-panel summary {
      font-weight: 850;
      list-style: none;
    }
    .delta-panel summary::-webkit-details-marker { display: none; }
    .delta-panel ul { margin: 10px 0 0 20px; padding: 0; }
    .disambig-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .choice {
      border: 1px solid rgba(143, 211, 255, 0.35);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--text);
      background: rgba(143, 211, 255, 0.1);
    }
    .choice:hover { background: rgba(143, 211, 255, 0.18); }
    .source p {
      color: var(--muted);
      margin: 10px 0 0;
      line-height: 1.5;
    }

    .composer {
      padding: 18px 30px 28px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.24));
    }
    .input-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 10px 10px 10px 18px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.28);
    }
    textarea {
      min-height: 46px;
      max-height: 150px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 11px 0;
      line-height: 1.45;
    }
    textarea::placeholder { color: rgba(255,255,255,0.38); }
    .send {
      border: 0;
      height: 46px;
      min-width: 46px;
      border-radius: 16px;
      color: #061018;
      font-weight: 900;
      background: linear-gradient(135deg, #8fd3ff, #9b8cff);
      box-shadow: 0 14px 34px rgba(143, 211, 255, 0.23);
    }
    .send:disabled { opacity: 0.45; cursor: not-allowed; }

    .thinking {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      color: var(--muted);
    }
    .thinking i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 900ms ease-in-out infinite alternate;
    }
    .thinking i:nth-child(2) { animation-delay: 130ms; }
    .thinking i:nth-child(3) { animation-delay: 260ms; }
    @keyframes pulse { to { transform: translateY(-4px); opacity: 0.45; } }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .shell { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      aside { order: 2; }
      main { min-height: 78vh; }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useEffect, useMemo, useRef, useState } = React;
    const API_URL = window.location.port === "8000" ? "" : "http://127.0.0.1:8000";
    const examples = [
      "What bioequivalence studies are required for generic oral semaglutide?",
      "What are the contraindications for Ozempic?",
      "What is the approved posology for Wegovy in adults?"
    ];

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function renderAnswer(text) {
      let html = escapeHtml(text || "");
      html = html.replace(/\[([^\]]+?\.pdf, §[^,\]]+, p\.\d+)\]/g, '<span class="cite">[$1]</span>');
      const blocks = html.split(/\n{2,}/).map((block) => {
        const lines = block.split(/\n/);
        if (lines.every((line) => /^[-*]\s+/.test(line.trim()))) {
          return "<ul>" + lines.map((line) => `<li>${line.trim().replace(/^[-*]\s+/, "")}</li>`).join("") + "</ul>";
        }
        if (lines.length === 1 && /^#{1,3}\s+/.test(lines[0].trim())) {
          return `<h3>${lines[0].trim().replace(/^#{1,3}\s+/, "")}</h3>`;
        }
        if (lines.length === 1 && /^[A-Z][^.!?]{2,70}:$/.test(lines[0].trim())) {
          return `<h3>${lines[0].trim().slice(0, -1)}</h3>`;
        }
        return `<p>${lines.join("<br />")}</p>`;
      }).join("");
      return { __html: blocks };
    }

    function App() {
      const [stats, setStats] = useState({ total_chunks: "—" });
      const [regBody, setRegBody] = useState("Any");
      const [formulation, setFormulation] = useState("Any");
      const [docType, setDocType] = useState("Any");
      const [messages, setMessages] = useState([]);
      const [history, setHistory] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const chatRef = useRef(null);

      useEffect(() => {
        fetch(`${API_URL}/collection/stats`).then((r) => r.json()).then(setStats).catch(() => {});
      }, []);

      useEffect(() => {
        chatRef.current?.scrollTo({ top: chatRef.current.scrollHeight, behavior: "smooth" });
      }, [messages, loading]);

      const filters = useMemo(() => {
        const f = {};
        if (regBody !== "Any") f.regulatory_body = regBody;
        if (formulation !== "Any") f.formulation = formulation;
        if (docType !== "Any") f.doc_type = docType;
        return f;
      }, [regBody, formulation, docType]);

      async function ask(prompt) {
        const query = (prompt || input).trim();
        if (!query || loading) return;
        setInput("");
        const nextMessages = [...messages, { role: "user", content: query }];
        setMessages(nextMessages);
        setLoading(true);
        try {
          const response = await fetch(`${API_URL}/query`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, conversation_history: history, metadata_filters: filters })
          });
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          setMessages([...nextMessages, { role: "assistant", content: data.answer, sources: data.sources || [], delta_alerts: data.delta_alerts || [], userQuery: query }]);
          setHistory([...history, { role: "user", content: query }, { role: "assistant", content: data.answer }].slice(-12));
        } catch (error) {
          setMessages([...nextMessages, { role: "assistant", content: `Something broke while answering: ${error.message}`, sources: [] }]);
        } finally {
          setLoading(false);
        }
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          ask();
        }
      }

      return React.createElement("div", { className: "shell" },
        React.createElement("aside", { className: "glass" },
          React.createElement("div", { className: "brand" },
            React.createElement("div", { className: "logo" }, "💊"),
            React.createElement("div", null,
              React.createElement("h1", null, "PharmaLens"),
              React.createElement("p", null, "Regulatory intelligence")
            )
          ),
          React.createElement("div", { className: "metric" },
            React.createElement("span", null, "Indexed knowledge chunks"),
            React.createElement("strong", null, stats.total_chunks)
          ),
          React.createElement("div", { className: "label" }, "Regulatory body"),
          React.createElement("select", { value: regBody, onChange: (e) => setRegBody(e.target.value) },
            ["Any", "FDA", "EMA", "ICH"].map((x) => React.createElement("option", { key: x }, x))
          ),
          React.createElement("div", { className: "label" }, "Formulation"),
          React.createElement("select", { value: formulation, onChange: (e) => setFormulation(e.target.value) },
            ["Any", "SubcutaneousSolution", "OralTablet"].map((x) => React.createElement("option", { key: x }, x))
          ),
          React.createElement("div", { className: "label" }, "Document type"),
          React.createElement("select", { value: docType, onChange: (e) => setDocType(e.target.value) },
            ["Any", "PSG", "EPAR", "CitizenPetition"].map((x) => React.createElement("option", { key: x }, x))
          ),
          React.createElement("div", { className: "examples" },
            React.createElement("div", { className: "label" }, "Try"),
            examples.map((example) => React.createElement("button", { className: "example", key: example, onClick: () => ask(example) }, example))
          )
        ),
        React.createElement("main", { className: "glass" },
          React.createElement("div", { className: "topbar" },
            React.createElement("div", { className: "hero" },
              React.createElement("h2", null, "PharmaLens"),
              React.createElement("p", null, "Ask formulation, bioequivalence, labeling, and lifecycle questions across the indexed semaglutide regulatory corpus.")
            ),
            React.createElement("div", { className: "status" }, React.createElement("span", { className: "dot" }), "Groq grounded QA")
          ),
          React.createElement("section", { className: "chat", ref: chatRef },
            messages.length === 0 && !loading
              ? React.createElement("div", { className: "empty" },
                  React.createElement("div", { className: "empty-card" },
                    React.createElement("h3", null, "Ask like you would ask a regulatory teammate."),
                    React.createElement("p", null, "Answers are grounded in retrieved PDF excerpts and cite the document, section, and page. Follow-ups like “give more” now expand the previous question instead of starting over.")
                  )
                )
              : messages.map((message, index) => React.createElement(Message, { key: index, message, onDisambiguate: ask })),
            loading && React.createElement("div", { className: "message assistant" },
              React.createElement("div", { className: "avatar ai" }, "⌁"),
              React.createElement("div", { className: "bubble" },
                React.createElement("span", { className: "thinking" }, "Reading sources", React.createElement("i"), React.createElement("i"), React.createElement("i"))
              )
            )
          ),
          React.createElement("div", { className: "composer" },
            React.createElement("div", { className: "input-wrap" },
              React.createElement("textarea", {
                value: input,
                onChange: (e) => setInput(e.target.value),
                onKeyDown,
                placeholder: "Ask about BE studies, posology, contraindications, labeling changes…"
              }),
              React.createElement("button", { className: "send", onClick: () => ask(), disabled: loading || !input.trim() }, "↑")
            )
          )
        )
      );
    }

    function modalityClass(value) {
      return String(value || "NEUTRAL").toLowerCase();
    }

    function isDisambiguation(message) {
      return !message.sources?.length && String(message.content || "").startsWith("Your question could apply to multiple semaglutide products");
    }

    function Message({ message, onDisambiguate }) {
      const isUser = message.role === "user";
      return React.createElement("div", { className: `message ${isUser ? "user" : "assistant"}` },
        React.createElement("div", { className: `avatar ${isUser ? "user" : "ai"}` }, isUser ? "●" : "⌁"),
        React.createElement("div", null,
          !isUser && message.delta_alerts?.length > 0 && React.createElement("details", { className: "delta-panel", open: true },
            React.createElement("summary", null, "⚠️ Version Change Detected"),
            React.createElement("ul", null, message.delta_alerts.map((alert, index) => React.createElement("li", { key: index }, alert)))
          ),
          React.createElement("div", { className: "bubble", dangerouslySetInnerHTML: renderAnswer(message.content) }),
          !isUser && isDisambiguation(message) && React.createElement("div", { className: "disambig-actions" },
            ["Ozempic", "Wegovy", "Rybelsus"].map((product) => React.createElement("button", {
              className: "choice",
              key: product,
              onClick: () => onDisambiguate(`${product} ${message.userQuery || ""}`.trim())
            }, product))
          ),
          !isUser && message.sources?.length > 0 && React.createElement("details", { className: "sources" },
            React.createElement("summary", null, `📚 ${message.sources.length} sources`),
            message.sources.map((source, index) => React.createElement("div", { className: "source", key: `${source.filename}-${index}` },
              React.createElement("div", { className: "source-title" },
                React.createElement("span", null, source.filename),
                React.createElement("span", { className: "pill" }, `${source.regulatory_body} · ${source.doc_type}`),
                React.createElement("span", { className: "pill" }, source.chunk_kind || "text"),
                source.dominant_modality && source.dominant_modality !== "NEUTRAL" && React.createElement("span", { className: `modality ${modalityClass(source.dominant_modality)}` }, source.dominant_modality),
                React.createElement("span", { className: "pill" }, `p.${source.page}`),
                React.createElement("span", { className: "pill" }, `score ${source.score}`)
              ),
              React.createElement("p", null, source.excerpt)
            ))
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
